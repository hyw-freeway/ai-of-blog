name: 自动部署到腾讯云

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到腾讯云服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "========== 开始部署 =========="
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            
            cd /var/www/ai-of-blog
            
            # 拉取最新代码
            echo ">>> 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            
            # 后端部署
            echo ">>> 部署后端..."
            cd back_end_of_blog
            npm install --production
            pm2 restart blog-api || pm2 start app.js --name blog-api
            
            # 前端部署
            echo ">>> 部署前端..."
            cd ../front_end_of_blog
            npm install
            npm run build
            
            echo "========== 部署完成 =========="
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
